<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heart Disease Prediction System</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f4f6f9;
        }

        .card {
            margin-top: 40px;
            margin-bottom: 40px;
            border: none;
            border-radius: 12px;
            box-shadow: 0 0 15px rgba(0,0,0,0.1);
        }

        .card-header {
            background-color: #0d6efd;
            color: white;
            text-align: center;
            font-size: 24px;
            font-weight: 600;
        }

        .section-title {
            margin-top: 20px;
            margin-bottom: 15px;
            color: #0d6efd;
            font-weight: 600;
        }

        .result {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            font-size: 20px;
            font-weight: bold;
        }

        .btn-predict {
            width: 100%;
            padding: 10px;
        }
    </style>
</head>
<body>

<div class="container">

    <div class="card">
        <div class="card-header">
            Heart Disease Prediction System
        </div>

        <div class="card-body">

            <form action="/predict" method="POST">

                <!-- Personal Information -->
                <h5 class="section-title">Personal Information</h5>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Age</label>
                        <input type="number"
                               class="form-control"
                               name="age"
                               min="20"
                               max="100"
                               placeholder="20 - 100"
                               required>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label">Sex</label>
                        <select class="form-select" name="sex" required>
                            <option value="">Select</option>
                            <option value="1">Male</option>
                            <option value="0">Female</option>
                        </select>
                    </div>
                </div>

                <!-- Clinical Information -->
                <h5 class="section-title">Clinical Information</h5>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Chest Pain Type</label>
                        <select class="form-select" name="cp" required>
                            <option value="">Select</option>
                            <option value="0">Typical Angina</option>
                            <option value="1">Atypical Angina</option>
                            <option value="2">Non-Anginal Pain</option>
                            <option value="3">Asymptomatic</option>
                        </select>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label">Resting Blood Pressure</label>
                        <input type="number"
                               class="form-control"
                               name="trestbps"
                               min="80"
                               max="250"
                               placeholder="80 - 250 mmHg"
                               required>
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Cholesterol</label>
                        <input type="number"
                               class="form-control"
                               name="chol"
                               min="100"
                               max="600"
                               placeholder="100 - 600 mg/dL"
                               required>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label">Fasting Blood Sugar</label>
                        <select class="form-select" name="fbs" required>
                            <option value="">Select</option>
                            <option value="0">≤ 120 mg/dL</option>
                            <option value="1">> 120 mg/dL</option>
                        </select>
                    </div>
                </div>

                <!-- ECG & Exercise -->
                <h5 class="section-title">ECG & Exercise Data</h5>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Rest ECG</label>
                        <select class="form-select" name="restecg" required>
                            <option value="">Select</option>
                            <option value="0">Normal</option>
                            <option value="1">ST-T Wave Abnormality</option>
                            <option value="2">Left Ventricular Hypertrophy</option>
                        </select>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label">Maximum Heart Rate</label>
                        <input type="number"
                               class="form-control"
                               name="thalach"
                               min="60"
                               max="220"
                               placeholder="60 - 220 bpm"
                               required>
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Exercise Induced Angina</label>
                        <select class="form-select" name="exang" required>
                            <option value="">Select</option>
                            <option value="0">No</option>
                            <option value="1">Yes</option>
                        </select>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label">Oldpeak</label>
                        <input type="number"
                               step="0.1"
                               class="form-control"
                               name="oldpeak"
                               min="0"
                               max="10"
                               placeholder="0 - 10"
                               required>
                    </div>
                </div>

                <!-- Additional Parameters -->
                <h5 class="section-title">Additional Parameters</h5>

                <div class="row">
                    <div class="col-md-4 mb-3">
                        <label class="form-label">Slope</label>
                        <select class="form-select" name="slope" required>
                            <option value="">Select</option>
                            <option value="0">Downsloping</option>
                            <option value="1">Flat</option>
                            <option value="2">Upsloping</option>
                        </select>
                    </div>

                    <div class="col-md-4 mb-3">
                        <label class="form-label">CA</label>
                        <select class="form-select" name="ca" required>
                            <option value="">Select</option>
                            <option value="0">0</option>
                            <option value="1">1</option>
                            <option value="2">2</option>
                            <option value="3">3</option>
                            <option value="4">4</option>
                        </select>
                    </div>

                    <div class="col-md-4 mb-3">
                        <label class="form-label">Thal</label>
                        <select class="form-select" name="thal" required>
                            <option value="">Select</option>
                            <option value="1">Normal</option>
                            <option value="2">Fixed Defect</option>
                            <option value="3">Reversible Defect</option>
                        </select>
                    </div>
                </div>

                <div class="d-grid mt-3">
                    <button type="submit" class="btn btn-primary btn-predict">
                        Predict
                    </button>
                </div>

            </form>

            {% if prediction %}
            <div class="alert alert-info mt-4 text-center">
                <strong>{{ prediction }}</strong>
            </div>
            {% endif %}

        </div>
    </div>

</div>

</body>
</html>
```
