
<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
    background:#f4f6f9;
}

.card{
    border:none;
    border-radius:15px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

</style>

</head>

<body>

<div class="container mt-5">

    <h1 class="text-center mb-5">
        Heart Disease Prediction Dashboard
    </h1>

    <div class="row mb-4">

        <div class="col-md-3">
            <div class="card p-3 text-center">
                <h5>Total Records</h5>
                <h2>302</h2>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card p-3 text-center">
                <h5>Heart Disease</h5>
                <h2>164</h2>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card p-3 text-center">
                <h5>Healthy</h5>
                <h2>138</h2>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card p-3 text-center">
                <h5>Best Accuracy</h5>
                <h2>83.61%</h2>
            </div>
        </div>

    </div>

    <div class="row">

        <div class="col-md-6">

            <div class="card p-3">
                <h4 class="text-center">
                    Disease Distribution
                </h4>

                <canvas id="pieChart"></canvas>

            </div>

        </div>

        <div class="col-md-6">

            <div class="card p-3">
                <h4 class="text-center">
                    Model Accuracy Comparison
                </h4>

                <canvas id="barChart"></canvas>

            </div>

        </div>

    </div>

    <div class="text-center mt-4">

        <a href="/" class="btn btn-primary">
            New Prediction
        </a>

    </div>

</div>

<script>

// Pie Chart

new Chart(
    document.getElementById('pieChart'),
    {
        type: 'pie',
        data: {
            labels: ['Heart Disease', 'Healthy'],
            datasets: [{
                data: [164,138]
            }]
        }
    }
);

// Bar Chart

new Chart(
    document.getElementById('barChart'),
    {
        type: 'bar',
        data: {
            labels: [
                'Logistic Regression',
                'Decision Tree',
                'Random Forest',
                'KNN'
            ],
            datasets: [{
                label: 'Accuracy (%)',
                data: [
                    77.05,
                    73.77,
                    83.61,
                    73.77
                ]
            }]
        }
    }
);

</script>

</body>
</html>
